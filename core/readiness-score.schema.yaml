# Readiness Score Schema
# 스킬이 자동 채점할 때 이 스키마를 참조한다.
# 상세 규칙과 판정 기준은 core/readiness-score.md를 따른다.

version: "1.0"
total_points: 100

thresholds:
  READY:
    min: 80
    description: "구현 가능. BLOCK 질문 0건."
  CONDITIONAL:
    min: 60
    max: 79
    description: "조건부 진행. ASSUME 가정을 status.md에 명시해야 함."
  NOT_READY:
    max: 59
    description: "구현 금지. BLOCK 질문 해결 필요."

areas:
  - id: scope_definition
    name: "기능 범위 정의"
    max_points: 15
    criteria:
      - id: goal_clarity
        description: "Goal이 명확하다"
        points: 5
        check: "requirements.md의 Goal 섹션이 구체적이고 측정 가능한 목표를 포함"
      - id: scope_boundary
        description: "In-Scope / Out-of-Scope가 구분되어 있다"
        points: 5
        check: "requirements.md의 In-Scope, Out-of-Scope 섹션에 각각 1개 이상 항목 존재"
      - id: scope_no_block
        description: "범위에 대한 BLOCK 질문이 없다"
        points: 5
        check: "questions.md에서 분류=scope인 BLOCK 질문이 0건"

  - id: policy_exception
    name: "정책/예외 확정"
    max_points: 20
    criteria:
      - id: policy_defined
        description: "핵심 비즈니스 정책이 명시되어 있다"
        points: 10
        check: "requirements.md Functional Requirements에 정책 관련 항목이 존재"
      - id: exception_handling
        description: "예외/에러/취소 처리 방침이 있다"
        points: 5
        check: "requirements.md에 예외 처리 또는 에러 시나리오 기술 존재"
      - id: policy_no_block
        description: "정책 관련 BLOCK 질문이 없다"
        points: 5
        check: "questions.md에서 분류=policy인 BLOCK 질문이 0건"

  - id: user_scenarios
    name: "사용자 시나리오"
    max_points: 15
    criteria:
      - id: user_types
        description: "주요 사용자 유형이 식별되어 있다"
        points: 5
        check: "requirements.md User Scenarios에 사용자 유형이 1개 이상 명시"
      - id: core_scenarios
        description: "핵심 시나리오가 기술되어 있다"
        points: 5
        check: "requirements.md User Scenarios에 시나리오가 2개 이상"
      - id: edge_cases
        description: "엣지 케이스가 식별되어 있다"
        points: 5
        check: "requirements.md에 예외/엣지 케이스 시나리오가 1개 이상"

  - id: nfr_check
    name: "NFR 확인"
    max_points: 15
    criteria:
      - id: performance
        description: "성능 요구사항이 확인되었거나 해당 없음이 명시되어 있다"
        points: 5
        check: "requirements.md 또는 technical-design.md에 성능 언급 존재"
      - id: security
        description: "보안/권한 요구사항이 확인되었다"
        points: 5
        check: "requirements.md에 보안 또는 권한 관련 요구사항 존재"
      - id: operations
        description: "운영 요구사항(알림, 모니터링, 배치)이 확인되었다"
        points: 5
        check: "requirements.md에 운영 관련 언급 존재 또는 해당 없음 명시"

  - id: approval_resolved
    name: "승인 항목 해결"
    max_points: 20
    cap_rule:
      condition: "BLOCK 질문이 1건 이상 남아 있을 때"
      max_allowed: 5
    criteria:
      - id: preconditions_resolved
        description: "Approval Preconditions에 나열된 항목이 모두 해결되었다"
        points: 10
        check: "requirements.md Approval Preconditions의 모든 항목에 해결 표시"
      - id: zero_block
        description: "BLOCK 질문이 0건이다"
        points: 10
        check: "questions.md Summary에서 BLOCK 상태인 OPEN 질문이 0건"

  - id: risk_assessment
    name: "리스크 평가"
    max_points: 15
    criteria:
      - id: risks_identified
        description: "리스크가 식별되어 있다"
        points: 5
        check: "requirements.md Initial Risk Assessment에 1개 이상 항목"
      - id: risk_mitigation
        description: "각 리스크에 대응 방안 또는 수용 판단이 있다"
        points: 5
        check: "식별된 리스크마다 대응 방안이 기술되어 있음"
      - id: brownfield_impact
        description: "기존 시스템 영향(brownfield)이 파악되어 있다"
        points: 5
        check: "brownfield인 경우 기존 모듈/테이블 영향이 명시. greenfield면 자동 5점"

  - id: user_stories_quality
    name: "사용자 스토리 품질"
    max_points: 10
    conditional: true
    activation: "GATE-2.5가 발동된 경우에만 채점"
    criteria:
      - id: persona_quality
        description: "페르소나가 실제 사용자 유형을 반영한다"
        points: 3
        check: "personas.md에 역할, 목표, 컨텍스트가 구체적으로 기술"
      - id: invest_compliance
        description: "유저 스토리가 INVEST 기준을 충족한다"
        points: 4
        check: "stories.md의 INVEST 체크리스트가 모두 충족"
      - id: gherkin_ac
        description: "Acceptance Criteria가 Gherkin 형식으로 검증 가능하다"
        points: 3
        check: "stories.md의 모든 AC가 Given-When-Then 형식"

  - id: system_design_quality
    name: "시스템 구조 설계"
    max_points: 10
    conditional: true
    activation: "GATE-2.7이 발동된 경우에만 채점"
    criteria:
      - id: component_separation
        description: "컴포넌트 식별과 책임 분리가 적절하다"
        points: 4
        check: "components.md에 각 컴포넌트의 책임이 명확히 기술"
      - id: service_boundary
        description: "서비스 레이어와 API 경계가 명확하다"
        points: 3
        check: "services.md에 오퍼레이션과 외부 노출 여부가 명시"
      - id: no_circular_dependency
        description: "의존성 매트릭스에 순환이 없다"
        points: 3
        check: "component-dependency.md에서 순환 의존 없음 확인"

conditional_scoring:
  description: "조건부 가점 영역은 해당 GATE가 발동된 경우에만 채점한다"
  base_total: 100
  max_bonus: 20
  threshold_calculation: "판정 임계값은 실제 만점의 80%/60% 비율로 환산"

rules:
  - "BLOCK 질문이 1건이라도 있으면 approval_resolved 영역은 최대 5점"
  - "score를 올리기 위해 BLOCK을 ASSUME으로 임의 변경하지 않는다"
  - "점수는 근거와 함께 기록한다"
  - "조건부 가점 영역은 해당 GATE가 발동된 경우에만 채점. 발동되지 않은 영역은 만점 계산에서 제외"
